name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  linux-ubuntu-24-04:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        gcc-version: [13, 14]
        build-type: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 \
            gcc-14 g++-14 \
            ninja-build \
            ccache \
            clang-tidy-20 \
            doxygen \
            python3-pip \
            python3-venv
          pip3 install --user pipx
          ~/.local/bin/pipx ensurepath
          ~/.local/bin/pipx install gcovr

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure (GCC ${{ matrix.gcc-version }} - ${{ matrix.build-type }})
        run: |
          if [ "${{ matrix.gcc-version }}" = "14" ]; then
            PRESET="linux-${{ matrix.build-type }}-newest-toolset"
            cmake --preset "$PRESET"
          else
            PRESET="linux-${{ matrix.build-type }}"
            cmake --preset "$PRESET" \
              -DCMAKE_C_COMPILER=gcc-${{ matrix.gcc-version }} \
              -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc-version }} \
              -DGCOV=gcov-${{ matrix.gcc-version }}
          fi

      - name: Build
        run: |
          if [ "${{ matrix.gcc-version }}" = "14" ]; then
            PRESET="linux-${{ matrix.build-type }}-newest-toolset"
          else
            PRESET="linux-${{ matrix.build-type }}"
          fi
          cmake --build --preset "$PRESET"

      - name: Build Documentation
        run: |
          if [ "${{ matrix.gcc-version }}" = "14" ]; then
            PRESET="linux-${{ matrix.build-type }}-newest-toolset"
          else
            PRESET="linux-${{ matrix.build-type }}"
          fi
          cmake --build --preset "$PRESET" --target build_documentation

      - name: Run Tests (Debug with Coverage - GCC 14)
        if: matrix.build-type == 'debug' && matrix.gcc-version == '14'
        run: |
          cmake --build --preset "linux-debug-newest-toolset" --target coverage_report
          # Extract and validate line coverage
          COVERAGE=$(gcovr --print-summary 2>/dev/null | grep "TOTAL" | awk '{print $NF}' | sed 's/%//')
          echo "Line Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "ERROR: Line coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi

      - name: Run All Tests (GCC 13 or GCC 14 Release)
        if: matrix.gcc-version == '13' || matrix.build-type == 'release'
        run: |
          if [ "${{ matrix.gcc-version }}" = "14" ]; then
            PRESET="linux-${{ matrix.build-type }}-newest-toolset"
          else
            PRESET="linux-${{ matrix.build-type }}"
          fi
          cmake --build --preset "$PRESET" --target run_all_tests

  linux-ubuntu-latest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-15 g++-15 \
            ninja-build \
            ccache \
            clang-tidy-20 \
            doxygen \
            python3-pip \
            python3-venv
          pip3 install --user pipx
          ~/.local/bin/pipx ensurepath
          ~/.local/bin/pipx install gcovr

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure (GCC 15 - ${{ matrix.build-type }})
        run: |
          PRESET="linux-${{ matrix.build-type }}"
          cmake --preset "$PRESET" \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DGCOV=gcov-15

      - name: Build
        run: |
          cmake --build --preset "linux-${{ matrix.build-type }}"

      - name: Build Documentation
        run: |
          cmake --build --preset "linux-${{ matrix.build-type }}" --target build_documentation

      - name: Run Tests (Debug with Coverage)
        if: matrix.build-type == 'debug'
        run: |
          cmake --build --preset "linux-debug" --target coverage_report
          # Extract and validate line coverage
          COVERAGE=$(gcovr --print-summary 2>/dev/null | grep "TOTAL" | awk '{print $NF}' | sed 's/%//')
          echo "Line Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "ERROR: Line coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi

      - name: Run All Tests (Release)
        if: matrix.build-type == 'release'
        run: |
          cmake --build --preset "linux-release" --target run_all_tests

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        preset: [x64-debug, x64-release, x86-debug, x86-release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install -y doxygen.install

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure (${{ matrix.preset }})
        run: |
          cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: |
          cmake --build --preset "${{ matrix.preset }}"

      - name: Build Documentation
        run: |
          cmake --build --preset "${{ matrix.preset }}" --target build_documentation

      - name: Run All Tests
        run: |
          cmake --build --preset "${{ matrix.preset }}" --target run_all_tests




